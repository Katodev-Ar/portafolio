[pytest]
# PrintBridge — Configuración centralizada de pytest
# Mejora 8 del Roadmap Técnico
#
# Ejecutar tests localmente:
#   pytest                          → todos los tests cross-platform
#   pytest -m win32_only            → solo tests que requieren Windows
#   pytest -m "not win32_only"      → solo tests cross-platform (equivalente a CI Linux)
#   pytest -v --tb=short            → verbose con traceback corto
#   pytest tests/test_printbridge.py::TestRateLimitS04 → una clase específica
#   pytest -k "test_login"          → tests por nombre

# ── Rutas ──────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Markers registrados ────────────────────────────────────────────────────
# Registrar markers evita el warning "PytestUnknownMarkWarning"
markers =
    win32_only: Tests que requieren win32print, win32ui o pystray (Windows únicamente).
                Skipeados automáticamente en Ubuntu/macOS.
    slow: Tests de integración o concurrencia que pueden tardar >5s.
          Excluir con: pytest -m "not slow"
    network: Tests que requieren conexión de red real (no mockeada).
    gui: Tests que interactúan con la GUI de Tkinter (requieren display).

# ── Timeouts ───────────────────────────────────────────────────────────────
# Requiere pytest-timeout. Evita que tests colgados bloqueen el CI indefinidamente.
timeout = 30
timeout_method = thread

# ── Output por defecto ─────────────────────────────────────────────────────
addopts =
    --strict-markers
    --tb=short
    --color=yes
    -ra

# ── Cobertura (activar explícitamente con --cov) ───────────────────────────
# No activar --cov por defecto para no ralentizar ejecución local normal.
# El CI lo activa explícitamente en cada job.

# ── Filtros de warnings ────────────────────────────────────────────────────
filterwarnings =
    # Suprimir deprecation de asyncio.get_event_loop en Python 3.12
    # (ya corregido en v5.3.2 con get_running_loop, pero puede aparecer en tests)
    ignore::DeprecationWarning:asyncio
    # Suprimir warnings de PIL/Pillow sobre paletas de imágenes en tests
    ignore::UserWarning:PIL
    # Convertir otros DeprecationWarning en errores para detectarlos temprano
    error::DeprecationWarning
    error::PendingDeprecationWarning
